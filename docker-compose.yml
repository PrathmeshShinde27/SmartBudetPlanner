services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-budget-planner-db
    environment:
      POSTGRES_DB: smart_budget_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smart_budget_planner_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_budget_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smart_budget_planner_pg:
